<div>
  <h1 class="title">إحصائيات المتجر</h1>
  @if (loading) { <p>جاري التحميل…</p> }
  @else {
    <div class="cards">
      <div class="stat-card green"><div class="icon">💰</div><div><p class="val">{{ earnings?.totalEarnings | currencyFormat }}</p><p class="lbl">إجمالي الأرباح</p></div></div>
      <div class="stat-card orange"><div class="icon">⏳</div><div><p class="val">{{ earnings?.pendingPayouts | currencyFormat }}</p><p class="lbl">مدفوعات معلقة</p></div></div>
      <div class="stat-card blue"><div class="icon">🏷️</div><div><p class="val">{{ productsCount }}</p><p class="lbl">منتجاتي</p></div></div>
      <div class="stat-card purple"><div class="icon">📦</div><div><p class="val">{{ ordersCount }}</p><p class="lbl">طلباتي</p></div></div>
    </div>
  }
</div>
