<div>
  <div class="header"><h2 class="page-title">الفئات</h2><button class="btn-add" (click)="openAdd()">+ إضافة فئة</button></div>
  @if (showForm) {
    <div class="form-card">
      <h3>{{ editItem ? 'تعديل الفئة' : 'فئة جديدة' }}</h3>
      <div class="field"><label>اسم الفئة</label><input [(ngModel)]="formName" placeholder="مثال: إلكترونيات" /></div>
      <div class="field"><label>الوصف</label><input [(ngModel)]="formDesc" placeholder="وصف مختصر" /></div>
      <div class="form-actions">
        <button class="btn-cancel" (click)="showForm=false">إلغاء</button>
        <button class="btn-save" (click)="save()" [disabled]="saving">{{ saving ? 'جاري الحفظ…' : 'حفظ' }}</button>
      </div>
    </div>
  }
  @if (loading) { <p>جاري التحميل…</p> }
  @else {
    <div class="table-wrap"><table class="table">
      <thead><tr><th>#</th><th>الاسم</th><th>الوصف</th><th>الحالة</th><th>إجراءات</th></tr></thead>
      <tbody>
        @for (c of categories; track c.id) {
          <tr>
            <td>{{ c.id }}</td>
            <td><strong>{{ c.name }}</strong></td>
            <td>{{ c.description }}</td>
            <td><span [class]="c.isActive ? 'ok' : 'off'">{{ c.isActive ? 'نشط' : 'معطل' }}</span></td>
            <td><div class="actions">
              <button class="btn-edit" (click)="openEdit(c)">تعديل</button>
              <button class="btn-del" (click)="delete(c.id)">حذف</button>
            </div></td>
          </tr>
        }
      </tbody>
    </table></div>
  }
</div>
