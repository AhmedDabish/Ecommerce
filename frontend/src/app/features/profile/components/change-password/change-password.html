<div>
  <h2 class="section-title">Change Password</h2>
  <form [formGroup]="form" (ngSubmit)="save()" class="form">
    <div class="field">
      <label>Current Password</label>
      <input type="password" formControlName="oldPassword" placeholder="••••••••" [class.err]="f['oldPassword'].invalid && f['oldPassword'].touched" />
      @if (f['oldPassword'].invalid && f['oldPassword'].touched) { <span class="error">Current password is required</span> }
    </div>
    <div class="field">
      <label>New Password</label>
      <input type="password" formControlName="newPassword" placeholder="Minimum 8 characters" [class.err]="f['newPassword'].invalid && f['newPassword'].touched" />
      @if (f['newPassword'].invalid && f['newPassword'].touched) { <span class="error">Minimum 8 characters required</span> }
    </div>
    <div class="field">
      <label>Confirm New Password</label>
      <input type="password" formControlName="confirmPassword" placeholder="Repeat new password" [class.err]="form.errors?.['mismatch'] && f['confirmPassword'].touched" />
      @if (form.errors?.['mismatch'] && f['confirmPassword'].touched) { <span class="error">Passwords do not match</span> }
    </div>
    <button type="submit" class="save-btn" [disabled]="saving">{{ saving ? 'Saving...' : 'Update Password' }}</button>
  </form>
</div>
