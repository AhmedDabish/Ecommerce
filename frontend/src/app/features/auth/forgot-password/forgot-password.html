<div class="auth-page"><div class="auth-card">
  @if (sent) {
    <div class="auth-header"><div class="logo">📧</div><h1>تم الإرسال</h1><p>لو البريد الإلكتروني موجود هيوصلك رابط إعادة التعيين</p></div>
    <a routerLink="/auth/login" class="btn-submit" style="display:block;text-align:center;text-decoration:none;">العودة لتسجيل الدخول</a>
  } @else {
    <div class="auth-header"><div class="logo">🔒</div><h1>نسيت كلمة المرور؟</h1><p>أدخل بريدك الإلكتروني وهنبعتلك رابط إعادة التعيين</p></div>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="field"><label>البريد الإلكتروني</label><input type="email" formControlName="email" placeholder="example@email.com" /></div>
      <button type="submit" class="btn-submit" [disabled]="loading">{{ loading ? 'جاري الإرسال…' : 'إرسال رابط إعادة التعيين' }}</button>
    </form>
    <p class="switch"><a routerLink="/auth/login">← العودة لتسجيل الدخول</a></p>
  }
</div></div>
