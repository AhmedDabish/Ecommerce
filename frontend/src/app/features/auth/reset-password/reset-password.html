<div class="auth-page"><div class="auth-card">
  @if (done) {
    <div class="auth-header"><div class="logo">✅</div><h1>تم تغيير كلمة المرور!</h1><p>سيتم توجيهك لتسجيل الدخول…</p></div>
  } @else {
    <div class="auth-header"><div class="logo">🔑</div><h1>تعيين كلمة مرور جديدة</h1></div>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="field"><label>كلمة المرور الجديدة</label><input type="password" formControlName="newPassword" placeholder="8 أحرف على الأقل" /><span class="err" *ngIf="f['newPassword'].invalid && f['newPassword'].touched">8 أحرف على الأقل</span></div>
      <div class="field"><label>تأكيد كلمة المرور</label><input type="password" formControlName="confirmPassword" placeholder="أعد الكتابة" /><span class="err" *ngIf="form.errors?.['mismatch'] && f['confirmPassword'].touched">كلمات المرور غير متطابقة</span></div>
      <button type="submit" class="btn-submit" [disabled]="loading">{{ loading ? 'جاري الحفظ…' : 'حفظ كلمة المرور' }}</button>
    </form>
  }
</div></div>
