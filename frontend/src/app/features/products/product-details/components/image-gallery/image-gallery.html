<div class="gallery">
  <div class="main-img" (click)="zoomed = !zoomed" [class.zoomed]="zoomed">
    <img [src]="main" alt="صورة المنتج" />
    <span class="zoom-hint">{{ zoomed ? '−' : '+' }}</span>
  </div>
  @if (images.length > 1) {
  <div class="thumbs">
    @for (img of images; track img.id; let i = $index) {
    <button
      class="thumb"
      [class.active]="i === activeIndex"
      (click)="activeIndex = i"
    >
      <img [src]="img.imageUrl" alt="" />
    </button>
    }
  </div>
  }
</div>
